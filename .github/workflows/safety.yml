permissions:
  contents: read
on:
  push:
    branches: [main, master]
  pull_request:

env:
  RUST_TOOLCHAIN: nightly-2026-05-28

name: Safety
jobs:
  sanitizers-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true
      - name: Install ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: |
            # to get the symbolizer for debug symbol resolution
            sudo apt install llvm
            # to fix buggy leak analyzer:
            # https://github.com/japaric/rust-san#unrealiable-leaksanitizer
            sed -i '/\[features\]/i [profile.dev]' Cargo.toml
            sed -i '/profile.dev/a opt-level = 1' Cargo.toml
            cat Cargo.toml
        name: Enable debug symbols
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test -Zsanitizer=address (unit)
        # only --lib --tests b/c of https://github.com/rust-lang/rust/issues/53945
        # Exclude heavy integration tests to reduce memory pressure under ASan
        # Skip failpoint tests: they use panic-based testing with global state
        # which is incompatible with sanitizers (spurious failures from parallel tests).
        run: cargo test --lib --tests --all-features --target x86_64-unknown-linux-gnu -- --skip integration --skip failpoint
        env:
          ASAN_OPTIONS: "detect_odr_violation=0:detect_leaks=0"
          RUSTFLAGS: "-Z sanitizer=address"
      - name: cargo test -Zsanitizer=leak (unit)
        if: always()
        run: cargo test --lib --tests --all-features --target x86_64-unknown-linux-gnu -- --skip integration --skip failpoint
        env:
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/lsan-suppressions.txt"
          RUSTFLAGS: "-Z sanitizer=leak"

  sanitizers-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: true
      - name: Install ${{ env.RUST_TOOLCHAIN }}
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: |
            # to get the symbolizer for debug symbol resolution
            sudo apt install llvm
            # to fix buggy leak analyzer:
            # https://github.com/japaric/rust-san#unrealiable-leaksanitizer
            sed -i '/\[features\]/i [profile.dev]' Cargo.toml
            sed -i '/profile.dev/a opt-level = 1' Cargo.toml
            cat Cargo.toml
        name: Enable debug symbols
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo test -Zsanitizer=address (integration)
        # Integration tests create many SSTs/memtables — limit parallelism to reduce memory
        run: cargo test --lib --tests --all-features --target x86_64-unknown-linux-gnu -- integration --test-threads=2
        env:
          ASAN_OPTIONS: "detect_odr_violation=0:detect_leaks=0"
          RUSTFLAGS: "-Z sanitizer=address"
      - name: cargo test -Zsanitizer=leak (integration)
        if: always()
        run: cargo test --lib --tests --all-features --target x86_64-unknown-linux-gnu -- integration --test-threads=2
        env:
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/lsan-suppressions.txt"
          RUSTFLAGS: "-Z sanitizer=leak"
